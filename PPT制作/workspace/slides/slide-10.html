<!DOCTYPE html><html><head><style>
html { background: #F8F5F0; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #F8F5F0; font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; }
</style></head><body>
<div style="margin: 40pt 55pt; display: flex; flex-direction: column; flex: 1;">
  <h1 style="font-size: 28pt; color: #1A1A1A; margin: 0 0 22pt 0; font-weight: bold;">超级个体的三层核心能力</h1>
  <div style="display: flex; flex-direction: column; gap: 12pt; flex: 1; justify-content: center;">
    <div style="display: flex; align-items: center; gap: 16pt;">
      <div style="background: #1A1A1A; border-radius: 50%; width: 44pt; height: 44pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 20pt; color: #FFFFFF; margin: 0; font-weight: bold;">①</p>
      </div>
      <div style="flex: 1; background: #1A1A1A; border-radius: 8pt; padding: 16pt 20pt;">
        <p style="font-size: 18pt; color: #FFFFFF; margin: 0; font-weight: bold;">需求洞察</p>
        <p style="font-size: 12pt; color: rgba(255,255,255,0.6); margin: 4pt 0 0 0;">找到"特别需要但自己做太折腾"的交叉点</p>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt;">
      <div style="background: #555555; border-radius: 50%; width: 44pt; height: 44pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 20pt; color: #FFFFFF; margin: 0; font-weight: bold;">②</p>
      </div>
      <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 16pt 20pt;">
        <p style="font-size: 18pt; color: #1A1A1A; margin: 0; font-weight: bold;">迭代速度</p>
        <p style="font-size: 12pt; color: #888888; margin: 4pt 0 0 0;">向AI清晰描述需求，快速跑通闭环</p>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 16pt;">
      <div style="background: #888888; border-radius: 50%; width: 44pt; height: 44pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 20pt; color: #FFFFFF; margin: 0; font-weight: bold;">③</p>
      </div>
      <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 16pt 20pt;">
        <p style="font-size: 18pt; color: #1A1A1A; margin: 0; font-weight: bold;">增长叙事</p>
        <p style="font-size: 12pt; color: #888888; margin: 4pt 0 0 0;">Building in Public，被看见</p>
      </div>
    </div>
  </div>
</div>
