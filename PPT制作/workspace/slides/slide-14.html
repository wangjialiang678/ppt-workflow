<!DOCTYPE html><html><head><style>
html { background: #F8F5F0; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #F8F5F0; font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; }
</style></head><body>
<div style="margin: 40pt 50pt; display: flex; flex-direction: column; flex: 1;">
  <h1 style="font-size: 26pt; color: #1A1A1A; margin: 0 0 6pt 0; font-weight: bold;">7天黑客松 → 四个产品</h1>
  <p style="font-size: 12pt; color: #888888; margin: 0 0 18pt 0;">张绍卿，14岁，无锡，普通初中生</p>
  <div style="display: flex; gap: 10pt; flex: 1;">
    <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 14pt; display: flex; flex-direction: column; border-top: 3pt solid #1A1A1A;">
      <p style="font-size: 11pt; color: #888888; margin: 0 0 6pt 0;">黑客松</p>
      <p style="font-size: 16pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">智能药箱</p>
      <p style="font-size: 10pt; color: #888888; margin: 0;">首个产品<br>AI写代码，他当产品经理</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 14pt; display: flex; flex-direction: column; border-top: 3pt solid #1A1A1A;">
      <p style="font-size: 11pt; color: #888888; margin: 0 0 6pt 0;">回校后</p>
      <p style="font-size: 16pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">作业管理系统</p>
      <p style="font-size: 10pt; color: #888888; margin: 0;">全年级使用<br>PK排行榜 + 积分激励</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 14pt; display: flex; flex-direction: column; border-top: 3pt solid #1A1A1A;">
      <p style="font-size: 11pt; color: #888888; margin: 0 0 6pt 0;">持续迭代</p>
      <p style="font-size: 16pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">校园二手平台</p>
      <p style="font-size: 10pt; color: #888888; margin: 0;">义卖捐图书馆<br>完整商业闭环</p>
    </div>
    <div style="flex: 1; background: #1A1A1A; border-radius: 8pt; padding: 14pt; display: flex; flex-direction: column; border-top: 3pt solid #F0EDE6;">
      <p style="font-size: 11pt; color: rgba(255,255,255,0.5); margin: 0 0 6pt 0;">游戏化</p>
      <p style="font-size: 16pt; color: #FFFFFF; margin: 0 0 8pt 0; font-weight: bold;">单词通</p>
      <p style="font-size: 10pt; color: rgba(255,255,255,0.5); margin: 0;">学校走正式采购流程<br>教务主任认可</p>
    </div>
  </div>
</div>
</body></html>
