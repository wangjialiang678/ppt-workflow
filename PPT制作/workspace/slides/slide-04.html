<!DOCTYPE html><html><head><style>
html { background: #F8F5F0; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #F8F5F0; font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; }
</style></head><body>
<div style="margin: 40pt 50pt; display: flex; flex-direction: column; flex: 1;">

      <p style="font-size: 14pt; color: #1A1A1A; margin: 0 0 10pt 0; font-weight: bold;">触宝</p>
      <p style="font-size: 11pt; color: #888888; margin: 0;">移动互联网早期</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column;">
      <p style="font-size: 36pt; color: #1A1A1A; margin: 0 0 6pt 0; font-weight: bold;">80+</p>
      <p style="font-size: 14pt; color: #1A1A1A; margin: 0 0 10pt 0; font-weight: bold;">手游公司</p>
      <p style="font-size: 11pt; color: #888888; margin: 0;">移动互联网成熟</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column;">
      <p style="font-size: 36pt; color: #1A1A1A; margin: 0 0 6pt 0; font-weight: bold;">12</p>
      <p style="font-size: 14pt; color: #1A1A1A; margin: 0 0 10pt 0; font-weight: bold;">线下密室</p>
      <p style="font-size: 11pt; color: #888888; margin: 0;">体验经济</p>
    </div>
    <div style="flex: 1; background: #1A1A1A; border-radius: 8pt; padding: 18pt; display: flex; flex-direction: column;">
      <p style="font-size: 36pt; color: #F0EDE6; margin: 0 0 6pt 0; font-weight: bold;">3+AI</p>
      <p style="font-size: 14pt; color: rgba(255,255,255,0.8); margin: 0 0 10pt 0; font-weight: bold;">超脑AI孵化器</p>
      <p style="font-size: 11pt; color: rgba(255,255,255,0.5); margin: 0;">AI原生</p>
    </div>
  </div>
  <div style="margin-top: 16pt; border-top: 1pt solid #E0DCD4; padding-top: 14pt;">
    <p style="font-size: 16pt; color: #1A1A1A; margin: 0; text-align: center;">过去创业是<span style="font-weight: bold;">找人</span>的艺术，未来创业是<span style="font-weight: bold;">不找人</span>的艺术</p>
  </div>
</div>
