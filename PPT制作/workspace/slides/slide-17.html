<!DOCTYPE html><html><head><style>
html { background: #F8F5F0; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #F8F5F0; font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; }
</style></head><body>
<div style="margin: 38pt 50pt 42pt 50pt; display: flex; flex-direction: column; flex: 1;">
  <h1 style="font-size: 26pt; color: #1A1A1A; margin: 0 0 16pt 0; font-weight: bold;">AI永远替代不了的三样东西</h1>
  <div style="display: flex; gap: 14pt; flex: 1;">
    <div style="flex: 1; background: #EFECE5; border-radius: 10pt; padding: 18pt; display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 3pt solid #1A1A1A;">
      <p style="font-size: 28pt; color: #1A1A1A; margin: 0 0 8pt 0;">◆</p>
      <p style="font-size: 20pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">品味</p>
      <p style="font-size: 12pt; color: #888888; margin: 0; line-height: 1.4;">判断什么值得做</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 10pt; padding: 18pt; display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 3pt solid #1A1A1A;">
      <p style="font-size: 28pt; color: #1A1A1A; margin: 0 0 8pt 0;">◎</p>
      <p style="font-size: 20pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">愿力</p>
      <p style="font-size: 12pt; color: #888888; margin: 0; line-height: 1.4;">决定成为谁</p>
    </div>
    <div style="flex: 1; background: #EFECE5; border-radius: 10pt; padding: 18pt; display: flex; flex-direction: column; align-items: center; text-align: center; border-bottom: 3pt solid #1A1A1A;">
      <p style="font-size: 28pt; color: #1A1A1A; margin: 0 0 8pt 0;">✦</p>
      <p style="font-size: 20pt; color: #1A1A1A; margin: 0 0 8pt 0; font-weight: bold;">意义建构</p>
      <p style="font-size: 12pt; color: #888888; margin: 0; line-height: 1.4;">为自己和他人讲故事</p>
    </div>
  </div>
  <div style="margin-top: 12pt; padding-top: 10pt; border-top: 1pt solid #E0DCD4;">
    <p style="font-size: 15pt; color: #555555; margin: 0; text-align: center;">AI能做一切，除了告诉你<span style="color: #1A1A1A; font-weight: bold;">什么值得做</span></p>
  </div>
</div>
</body></html>
