<!DOCTYPE html><html><head><style>
html { background: #F8F5F0; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #F8F5F0; font-family: Arial, sans-serif; display: flex; flex-direction: column; box-sizing: border-box; }
</style></head><body>
<div style="margin: 50pt 60pt; display: flex; flex-direction: column; flex: 1; justify-content: center;">
  <p style="font-size: 12pt; color: #888888; margin: 0 0 16pt 0; letter-spacing: 2pt;">被忽视的真相</p>
  <h1 style="font-size: 38pt; color: #1A1A1A; margin: 0 0 30pt 0; line-height: 1.3; font-weight: bold;">AI冲击最大的不是底层<br><span style="color: #C0392B;">是中层</span></h1>
  <div style="display: flex; align-items: flex-end; gap: 0; margin-bottom: 20pt;">
    <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
      <div style="background: #EFECE5; width: 80pt; height: 40pt; border-radius: 4pt 4pt 0 0; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 11pt; color: #1A1A1A; margin: 0;">决策层</p>
      </div>
      <div style="background: #C0392B; width: 140pt; height: 50pt; display: flex; align-items: center; justify-content: center; border: 2pt dashed #1A1A1A;">
        <p style="font-size: 12pt; color: #FFFFFF; margin: 0; font-weight: bold;">协调层 · 断裂带</p>
      </div>
      <div style="background: #E0DCD4; width: 200pt; height: 50pt; border-radius: 0 0 4pt 4pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 11pt; color: #888888; margin: 0;">执行层</p>
      </div>
    </div>
    <div style="flex: 1; padding-left: 30pt;">
      <p style="font-size: 13pt; color: #1A1A1A; margin: 0 0 10pt 0;">项目经理 · 总监 · VP</p>
      <p style="font-size: 13pt; color: #555555; margin: 0;">AI调度50个Agent<br>比你管50个人更高效</p>
    </div>
  </div>
</div>
</body></html>
